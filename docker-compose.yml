services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - hf_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blogify
      POSTGRES_PASSWORD: blogify_secret_dev
      POSTGRES_DB: blogify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogify"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull the default model the first time the container starts.
    # Override OLLAMA_MODEL in .env to change it.
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "ollama serve & \
       sleep 3 && \
       ollama pull ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct} || true && \
       wait"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: blogify_minio
      MINIO_ROOT_PASSWORD: blogify_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  celery-worker:
    build: ./backend
    # Concurrency kept low because each forked worker loads its own CLIP +
    # MiniLM model (~600 MB). Default prefork=CPU-count OOM'd Docker Desktop.
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - hf_cache:/app/.cache/huggingface
    depends_on:
      - redis
      - postgres
      - qdrant
      - ollama
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  hf_cache:
  ollama_data:
